<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pedro Sigismundo · Vision AI</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>

  <style>
    :root {
      --bg:        #050810;
      --surface:   #0d1120;
      --border:    #1e2a44;
      --accent:    #00f5c8;
      --accent2:   #7b5cfa;
      --text:      #e8eaf6;
      --muted:     #5c6b8a;
      --glow:      0 0 28px rgba(0,245,200,.35);
      --glow2:     0 0 28px rgba(123,92,250,.35);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Noise overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    /* ── Ambient blobs ── */
    .blob {
      position: fixed; border-radius: 50%; filter: blur(120px);
      opacity: .18; pointer-events: none; z-index: 0;
    }
    .blob-1 { width: 520px; height: 520px; background: var(--accent2); top: -120px; left: -120px; animation: drift 14s ease-in-out infinite alternate; }
    .blob-2 { width: 400px; height: 400px; background: var(--accent);  bottom: -80px;  right: -80px;  animation: drift 18s ease-in-out infinite alternate-reverse; }
    @keyframes drift { from { transform: translate(0,0) scale(1); } to { transform: translate(40px,40px) scale(1.1); } }

    /* ── Layout ── */
    .wrapper {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 2.5rem 1rem 3rem;
      gap: 2rem;
    }

    /* ── Header ── */
    header { text-align: center; }
    .eyebrow {
      font-family: 'Space Mono', monospace;
      font-size: .72rem; letter-spacing: .22em; text-transform: uppercase;
      color: var(--accent); opacity: .85;
    }
    h1 {
      font-size: clamp(2rem, 6vw, 3.6rem);
      font-weight: 800; line-height: 1.05;
      background: linear-gradient(120deg, #fff 30%, var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-top: .4rem;
    }
    .subtitle {
      font-family: 'Space Mono', monospace;
      font-size: .78rem; color: var(--muted); margin-top: .6rem; letter-spacing: .05em;
    }

    /* ── Card ── */
    .card-glass {
      background: rgba(13,17,32,.78);
      border: 1px solid var(--border);
      border-radius: 20px;
      backdrop-filter: blur(18px);
      padding: 2rem;
      width: 100%; max-width: 480px;
      box-shadow: 0 8px 40px rgba(0,0,0,.5);
    }

    /* ── Start Button ── */
    .btn-start {
      position: relative; overflow: hidden;
      display: inline-flex; align-items: center; gap: .55rem;
      padding: .85rem 2.2rem;
      font-family: 'Space Mono', monospace; font-size: .9rem; font-weight: 700;
      letter-spacing: .06em; text-transform: uppercase;
      color: var(--bg);
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 50px;
      cursor: pointer;
      box-shadow: var(--glow);
      transition: transform .2s, box-shadow .2s;
      animation: pulse-ring 2.4s ease-in-out infinite;
    }
    .btn-start:hover  { transform: translateY(-3px) scale(1.03); box-shadow: 0 0 48px rgba(0,245,200,.55); }
    .btn-start:active { transform: translateY(0) scale(.98); }
    .btn-start::after {
      content: ''; position: absolute; inset: 0; border-radius: inherit;
      background: linear-gradient(135deg, rgba(255,255,255,.25), transparent);
      opacity: 0; transition: opacity .2s;
    }
    .btn-start:hover::after { opacity: 1; }

    @keyframes pulse-ring {
      0%, 100% { box-shadow: 0 0 0 0 rgba(0,245,200,.45), var(--glow); }
      50%       { box-shadow: 0 0 0 14px rgba(0,245,200,0), var(--glow); }
    }

    .btn-start.started {
      background: linear-gradient(135deg, #1e2a44, #0d1120);
      color: var(--accent); box-shadow: none; animation: none;
      border: 1px solid var(--border);
    }

    /* spinner inside button */
    .spin { display: none; width: 16px; height: 16px; border: 2px solid rgba(0,0,0,.3); border-top-color: var(--bg); border-radius: 50%; animation: spin .7s linear infinite; }
    .loading .spin { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Webcam container ── */
    #webcam-container {
      display: flex; justify-content: center;
      margin-top: 1.5rem;
    }
    #webcam-container canvas {
      border-radius: 14px;
      border: 1px solid var(--border);
      box-shadow: var(--glow2);
      width: 100% !important; max-width: 320px; height: auto !important;
      display: block;
    }

    /* scan line animation over webcam */
    .cam-wrap { position: relative; display: inline-block; max-width: 320px; width: 100%; }
    .cam-wrap::after {
      content: '';
      position: absolute; left: 0; right: 0; top: 0; height: 3px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      animation: scan 2.8s ease-in-out infinite;
      border-radius: 2px; pointer-events: none;
    }
    @keyframes scan { 0% { top: 0; opacity: .9; } 100% { top: 100%; opacity: 0; } }

    /* ── Labels / Progress bars ── */
    #label-container { margin-top: 1.8rem; display: flex; flex-direction: column; gap: .9rem; }

    .label-row { display: flex; flex-direction: column; gap: .35rem; }

    .label-header {
      display: flex; justify-content: space-between; align-items: center;
    }
    .label-name {
      font-family: 'Space Mono', monospace; font-size: .75rem;
      text-transform: uppercase; letter-spacing: .1em; color: var(--text);
    }
    .label-pct {
      font-family: 'Space Mono', monospace; font-size: .75rem;
      color: var(--accent); font-weight: 700; min-width: 3ch; text-align: right;
    }

    .progress-track {
      height: 8px; background: var(--border); border-radius: 999px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 999px; width: 0%;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      transition: width .35s cubic-bezier(.4,0,.2,1);
      box-shadow: 0 0 10px rgba(0,245,200,.4);
    }

    /* ── Footer ── */
    footer {
      font-family: 'Space Mono', monospace; font-size: .68rem;
      color: var(--muted); text-align: center; letter-spacing: .06em;
    }
    footer a { color: var(--accent); text-decoration: none; }

    /* ── Responsive tweaks ── */
    @media (min-width: 600px) {
      .card-glass { padding: 2.5rem; }
    }
  </style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="wrapper">

  <!-- Header -->
  <header>
    <p class="eyebrow"><i class="bi bi-cpu"></i> &nbsp;Teachable Machine</p>
    <h1>Pedro Sigismundo</h1>
    <p class="subtitle">// vision · classification · real-time</p>
  </header>

  <!-- Main card -->
  <div class="card-glass">

    <!-- Button -->
    <div class="d-flex justify-content-center">
      <button id="btn-start" class="btn-start" onclick="init()">
        <span class="spin" id="btn-spin"></span>
        <i class="bi bi-camera-video-fill" id="btn-icon"></i>
        <span id="btn-label">Ativar Câmera</span>
      </button>
    </div>

    <!-- Webcam -->
    <div id="webcam-container">
      <div class="cam-wrap" id="cam-wrap" style="display:none">
        <!-- canvas inserted here by JS -->
      </div>
    </div>

    <!-- Progress bars -->
    <div id="label-container"></div>

  </div>

  <!-- Footer -->
  <footer>
    <p>Powered by <a href="https://teachablemachine.withgoogle.com/" target="_blank">Teachable Machine</a> &amp; TensorFlow.js</p>
  </footer>

</div>

<!-- TensorFlow + Teachable Machine -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
  const URL = "https://teachablemachine.withgoogle.com/models/ZkZaIQpyWX/";
  let model, webcam, labelContainer, maxPredictions;
  let initialized = false;

  async function init() {
    if (initialized) return;
    initialized = true;

    // Button → loading state
    const btn      = document.getElementById('btn-start');
    const btnLabel = document.getElementById('btn-label');
    const btnIcon  = document.getElementById('btn-icon');
    const btnSpin  = document.getElementById('btn-spin');

    btn.classList.add('loading');
    btnIcon.style.display = 'none';
    btnSpin.style.display = 'block';
    btnLabel.textContent  = 'Carregando…';
    btn.disabled = true;

    try {
      model = await tmImage.load(URL + "model.json", URL + "metadata.json");
      maxPredictions = model.getTotalClasses();

      const flip = true;
      webcam = new tmImage.Webcam(320, 320, flip);
      await webcam.setup();
      await webcam.play();
      window.requestAnimationFrame(loop);

      // Show canvas inside cam-wrap
      const wrap = document.getElementById('cam-wrap');
      wrap.style.display = 'inline-block';
      wrap.appendChild(webcam.canvas);

      // Build progress rows
      labelContainer = document.getElementById("label-container");
      labelContainer.innerHTML = '';
      for (let i = 0; i < maxPredictions; i++) {
        const row = document.createElement('div');
        row.className = 'label-row';
        row.innerHTML = `
          <div class="label-header">
            <span class="label-name" id="lname-${i}">Classe ${i + 1}</span>
            <span class="label-pct" id="lpct-${i}">0%</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" id="lbar-${i}"></div>
          </div>`;
        labelContainer.appendChild(row);
      }

      // Button → active state
      btn.classList.remove('loading');
      btn.classList.add('started');
      btnSpin.style.display = 'none';
      btnIcon.className = 'bi bi-stop-circle';
      btnIcon.style.display = 'inline';
      btnLabel.textContent = 'Câmera Ativa';

    } catch (err) {
      btn.classList.remove('loading');
      btnSpin.style.display = 'none';
      btnIcon.style.display = 'inline';
      btnLabel.textContent  = 'Erro – Tente Novamente';
      btn.disabled = false;
      initialized = false;
      console.error(err);
    }
  }

  async function loop() {
    webcam.update();
    await predict();
    window.requestAnimationFrame(loop);
  }

  async function predict() {
    const prediction = await model.predict(webcam.canvas);
    for (let i = 0; i < maxPredictions; i++) {
      const pct = (prediction[i].probability * 100).toFixed(1);
      document.getElementById(`lname-${i}`).textContent = prediction[i].className;
      document.getElementById(`lpct-${i}`).textContent  = pct + '%';
      document.getElementById(`lbar-${i}`).style.width  = pct + '%';
    }
  }
</script>
</body>
</html>
